services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sitio
      POSTGRES_USER: sitio
      POSTGRES_PASSWORD: sitio
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitio -d sitio"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sitio:sitio@db:5432/sitio
      PORT: 3000
      STORAGE_MODE: local
      LOCAL_STORAGE_PATH: /data/uploads
      SEED_NOTEBOOK_DATA: "true"
    command: ["sh", "-c", "node dist/db/migrate.js && node dist/db/seed.js && node dist/server/index.js"]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - uploads_data:/data/uploads
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
